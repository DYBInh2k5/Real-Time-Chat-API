version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: realtime-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realtime_chat
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chat-network

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: realtime-chat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - chat-network

  # MongoDB for Chat History (Optional)
  mongodb:
    image: mongo:7
    container_name: realtime-chat-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: chat_history
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - chat-network

  # NestJS Application (Uncomment when ready to containerize)
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: realtime-chat-api
  #   restart: unless-stopped
  #   ports:
  #     - '3000:3000'
  #   environment:
  #     - NODE_ENV=production
  #     - DB_HOST=postgres
  #     - REDIS_HOST=redis
  #   depends_on:
  #     - postgres
  #     - redis
  #     - mongodb
  #   networks:
  #     - chat-network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:

networks:
  chat-network:
    driver: bridge

